---
name: Build disk images

on:
  workflow_dispatch:
    inputs:
      upload-to-s3:
        description: "Upload to S3"
        required: false
        default: false
        type: boolean
      platform:
        required: true
        type: choice
        options:
          - amd64
          - arm64
  workflow_run:
    workflows: ["Build container image"]
    types:
      - completed
  pull_request:
    branches:
      - main
    paths:
      - './disk_config/disk.toml'
      - './disk_config/iso.toml'
      - './.github/workflows/build-disk.yml'

env:
  IMAGE_NAME: "bazzite_zone"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "latest"
  BIB_IMAGE: "quay.io/centos-bootc/bootc-image-builder:latest"
  CONFIG_FILE: "./disk_config/disk.toml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  precheck:
    name: Check whether a new container image was published
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Check workflow_run image metadata
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" != "workflow_run" ]]; then
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          IMAGE_REPO="${GITHUB_REPOSITORY_OWNER,,}/${IMAGE_NAME,,}"

          mark_build_required() {
            echo "$1"
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
            exit 0
          }

          get_registry_token() {
            curl -fsSL \
              -u "${GITHUB_ACTOR}:${GH_TOKEN}" \
              "https://ghcr.io/token?service=ghcr.io&scope=repository:${IMAGE_REPO}:pull" \
              | jq -r '.token'
          }

          get_image_label() {
            local token="$1"
            local manifest config_digest

            manifest="$(curl -fsSL \
              -H "Authorization: Bearer ${token}" \
              -H "Accept: application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.v2+json" \
              "https://ghcr.io/v2/${IMAGE_REPO}/manifests/${DEFAULT_TAG}")"
            config_digest="$(jq -r '.config.digest // empty' <<< "${manifest}")"

            if [[ -z "${config_digest}" ]]; then
              return 1
            fi

            curl -fsSL \
              -H "Authorization: Bearer ${token}" \
              "https://ghcr.io/v2/${IMAGE_REPO}/blobs/${config_digest}" \
              | jq -r '.config.Labels["io.github.bazzite-zone.workflow-run-id"] // empty'
          }

          IMAGE_TOKEN="$(get_registry_token)" || mark_build_required "Unable to inspect the current published image; continuing with disk builds."
          LATEST_RUN_ID=""

          if LATEST_RUN_ID="$(get_image_label "${IMAGE_TOKEN}" 2>/dev/null)"; then
            :
          else
            LATEST_RUN_ID=""
          fi

          if [[ "${LATEST_RUN_ID}" == "${{ github.event.workflow_run.id }}" ]]; then
            echo "A new container image was published by the triggering workflow."
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
          else
            echo "The triggering workflow did not publish a new latest image; skipping disk builds."
            echo "should_build=false" >> "${GITHUB_OUTPUT}"
          fi

  build:
    name: Build disk images
    needs: precheck
    if: needs.precheck.outputs.should_build == 'true' && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
    runs-on: ${{ inputs.platform == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      fail-fast: false
      matrix:
        disk-type: ["qcow2", "anaconda-iso"]
    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Prepare environment
        run: |
          USER_UID=$(id -u)
          USER_GID=$(id -g)
          DISK_TYPE=$(echo "${{ matrix['disk-type'] }}" | tr ' ' '-')
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> "${GITHUB_ENV}"
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "${GITHUB_ENV}"
          echo "DISK_TYPE=${DISK_TYPE}" >> "${GITHUB_ENV}"
          echo "USER_UID=${USER_UID}" >> "${GITHUB_ENV}"
          echo "USER_GID=${USER_GID}" >> "${GITHUB_ENV}"
          if [ "${{ matrix['disk-type'] }}" = "anaconda-iso" ]; then
            echo "CONFIG_FILE=./disk_config/iso.toml" >> "${GITHUB_ENV}"
          else
            echo "CONFIG_FILE=./disk_config/disk.toml" >> "${GITHUB_ENV}"
          fi

      - name: Install dependencies
        if: inputs.platform == 'arm64' || runner.arch == 'ARM64'
        run: |
          set -x
          sudo apt update -y
          sudo apt install -y podman

      - name: Maximize build space
        if: inputs.platform != 'arm64' && runner.arch != 'ARM64'
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9
        with:
          remove-codeql: true

      - name: Debug config file
        run: |
          echo "CONFIG_FILE=${{ env.CONFIG_FILE }}"
          ls -l "${{ env.CONFIG_FILE }}"
          sed -n '1,40p' "${{ env.CONFIG_FILE }}"

      - name: Log in to GHCR
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GHCR_TOKEN}" | sudo podman login ghcr.io -u "${GHCR_USER}" --password-stdin

      - name: Pre-pull container image
        run: |
          sudo podman pull "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}"

      - name: Build disk images
        id: build
        uses: osbuild/bootc-image-builder-action@main
        with:
          builder-image: ${{ env.BIB_IMAGE }}
          config-file: ${{ env.CONFIG_FILE }}
          image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}
          chown: ${{ env.USER_UID }}:${{ env.USER_GID }}
          types: ${{ matrix['disk-type'] }}
          rootfs: xfs

      - name: Upload disk images and Checksum to Job Artifacts
        if: inputs.upload-to-s3 != true && github.event_name != 'pull_request'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix['disk-type'] }}
          path: ${{ steps.build.outputs.output-directory }}
          if-no-files-found: error
          retention-days: 0
          compression-level: 0
          overwrite: true

      - name: Upload to S3
        if: inputs.upload-to-s3 == true && github.event_name != 'pull_request'
        shell: bash
        env:
          RCLONE_CONFIG_S3_TYPE: s3
          RCLONE_CONFIG_S3_PROVIDER: ${{ secrets.S3_PROVIDER }}
          RCLONE_CONFIG_S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          RCLONE_CONFIG_S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_S3_REGION: ${{ secrets.S3_REGION }}
          RCLONE_CONFIG_S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          SOURCE_DIR: ${{ steps.build.outputs.output-directory }}
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone
          rclone copy "$SOURCE_DIR" "S3:${{ secrets.S3_BUCKET_NAME }}"
